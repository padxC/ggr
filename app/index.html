<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PADx - VPN Controller</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/index.css">
    
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <style>
        /* WebSocket status indicator */
        .ws-status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.25rem 0.75rem;
            background: rgba(0, 219, 233, 0.1);
            border-radius: 1rem;
            font-size: 0.75rem;
            margin-left: 1rem;
        }
        
        .ws-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .ws-dot.connected { background: #10b981; }
        .ws-dot.disconnected { background: #ef4444; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <!-- Left Sidebar Navigation -->
    <aside class="sidebar-nav">
        <div class="sidebar-top">
            <div class="nav-item active" data-page="dashboard">
                <span class="material-symbols-outlined nav-icon">dashboard</span>
                <span class="nav-label">Home</span>
            </div>
        </div>
        <div class="sidebar-bottom">
            <div class="nav-item" data-page="support">
                <span class="material-symbols-outlined nav-icon">help</span>
                <span class="nav-label">Support</span>
            </div>
        </div>
    </aside>

    <!-- Right Sidebar (Status Panel) -->
    <aside class="status-sidebar">
        <div class="status-card">
            <div class="status-header">
                <div>
                    <div class="status-label">Status</div>
                    <div class="status-value" id="connectionStatus">Disconnected</div>
                </div>
                <div class="status-indicator disconnected" id="statusIndicator"></div>
            </div>
            <div class="ws-status" id="wsStatus">
                <span class="ws-dot disconnected" id="wsDot"></span>
                <span id="wsText">Connecting...</span>
            </div>
            <div class="current-download">
                <div class="speed-value">
                    <span class="speed-number" id="currentSpeed">0</span>
                    <span class="speed-unit">Mbps</span>
                </div>
                <div class="download-label">Current Download</div>
            </div>
            <div class="status-details">
                <div class="detail-row">
                    <!-- change to hostname -->
                    <div class="detail-label">Node ID</div>
                    <div class="detail-value" id="activeNode">--</div>
                </div>
                <div class="detail-grid">
                    <div class="detail-item">
                        <div class="detail-label">Ping</div>
                        <div class="detail-value" id="activePing">--</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Upload</div>
                        <div class="detail-value" id="activeUpload">-- <small>Mbps</small></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="action-btn" id="openBrowserBtn">
                <span>Open Rhaon</span>
                <span class="material-symbols-outlined">public</span>
            </button>
            <button class="action-btn primary" id="autoConnectBtn">
                <span>Auto-Connect</span>
                <span class="material-symbols-outlined">bolt</span>
            </button>
            <button class="action-btn danger" id="disconnectBtn">
                <span>Disconnect</span>
                <span class="material-symbols-outlined">power_settings_new</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="content-wrapper">
            <div id="dashboardView" class="view active">
                <!-- Server Table -->
                <div class="server-table-container">
                    <div class="table-header">
                        <h3>
                            <span class="status-line"></span>
                            Server List
                        </h3>
                        <div class="table-controls">
    <div class="filter-toggles">
        <button class="filter-toggle active" data-country="KR">🇰🇷 Korea</button>
        <button class="filter-toggle" data-country="TH">🇹🇭 Thailand</button>
    </div>
                            <span class="control-btn" id="sortByLatency">Sort by Latency</span>
                            <span class="control-btn" id="refreshServers">Refresh List</span>
                        </div>
                    </div>
                    <div class="table-wrapper">
                        <table class="server-table">
                            <thead>
                                <tr>
                                    <th>Hostname</th>
                                    <th>Score</th>
                                    <th>Speed</th>
                                    <th>Latency</th>
                                    <th>Total</th>
                                </tr>
                            </thead>
                            <tbody id="serverTableBody">
                                <tr><td colspan="5" style="text-align: center;">Loading servers......</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Activity Log -->
                <div class="activity-log">
                    <div class="log-header">
                        <div class="log-title">
                            <span class="status-line"></span>
                            <span>Activity Log</span>
                        </div>
                    </div>
                    <div class="log-content" id="activityLog">
                        <p><span class="timestamp">[System]</span> Initializing VPN Controller...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="bg-gradient"></div>


    <script src="js/websocket.js"></script>
    <script src="js/repositories.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
